<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Balatro Project</title>
    <!-- 内联 SVG favicon，避免浏览器自动请求 /favicon.ico 导致 404 -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='8' y='4' width='48' height='56' rx='8' fill='%23ffffff' stroke='%23000' stroke-width='2'/%3E%3Ctext x='32' y='42' font-size='36' text-anchor='middle' font-family='serif' fill='%23d22'%3E%E2%99%A5%3C/text%3E%3C/svg%3E" />

    <!-- 引入像素字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=VT323&display=swap" rel="stylesheet">
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #2c3e50;
        font-family: "Jersey 10", "VT323", "Microsoft YaHei", system-ui, sans-serif;
        color: #fff;
      }
      #app {
        position: absolute;
        inset: 0;
      }
      #app canvas {
        display: block;
      }
      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 24px;
        pointer-events: none;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loading">正在初始化 WebGPU 引擎与游戏资源...</div>

    <!--
      运行时调参面板（参考 docs/wheels/control-panel-capsule）
      ------------------------------------------------------------
      约定：
        - 隐藏触发器 #panel-trigger 平时只显示"调试"两个字；连点 3 次（600ms 内）打开面板。
        - 面板内每一个 .panel-group 自动被 ControlPanel 抽成左侧 tab。
        - 每个控件用 id="inp-xxx" + id="val-xxx" 一对绑定，JS 端用 bindSlider/bindNumber/... 串起来。
        - 想加新参数：在 RuntimeConfig 加字段 → 在这里加一行 .panel-row → 在 ControlPanel 里 bindXxx 一行。
    -->
    <div
      id="panel-trigger"
      role="button"
      tabindex="0"
      aria-label="打开调试面板"
    >调试</div>

    <aside
      id="control-panel"
      style="display: none"
      aria-label="运行时调参面板"
    >
      <div id="panel-header">
        <span>Control Panel <span id="panel-version">v1</span></span>
        <button id="toggle-panel" type="button">隐藏</button>
      </div>

      <div id="panel-body">
        <nav id="panel-tabs" aria-label="参数分组"></nav>

        <div id="panel-content">
          <!--
            分组规划（为后续设计预留，内容暂留空）：
              1. 存档专项     - 保留 preset 保存/读取/导入/导出/恢复默认。
              2. 牌的绘制专项 - 卡牌视觉绘制相关参数（尺寸、字号、颜色等）。
              3. 界面UI专项   - HUD/侧栏/按钮/面板布局相关参数。
              4. 卡牌逻辑专项 - 手牌数、出弃次数、目标分、选牌上限等规则参数。
              5. 卡牌视效专项 - 卡牌移动/悬停/飞出/翻面等动效参数。
              6. 文字视效专项 - 计分弹字/牌型显示/数字滚动等文字动效参数。

            约定：除"存档专项"是已实现的预设管理外，其余分组目前为空 .panel-row 占位，
            未来在 RuntimeConfig 加字段后，往对应分组里加 .panel-row + 在 ControlPanel
            里 bindXxx 一行即可。
          -->

          <!-- 1. 存档专项 -->
          <details class="panel-group" open>
            <summary>存档</summary>
            <div class="panel-row">
              <button id="btn-save-config" type="button">把当前参数存为本地默认</button>
            </div>
            <div class="panel-row">
              <button id="btn-reset-config" type="button">恢复出厂默认</button>
            </div>
            <div class="panel-row">
              <button id="btn-export-shipping" type="button" style="background:#5c7cf0;color:white;">一键导出 Shipping 预设 (shipping.json)</button>
            </div>
            <div class="panel-row">
              <input
                class="panel-text"
                id="inp-preset-name"
                type="text"
                placeholder="预设名"
              />
              <button id="btn-save-preset" type="button">保存当前为预设</button>
            </div>
            <div class="panel-row">
              <select class="panel-select" id="sel-preset-list">
                <option value="">-- 选择预设 --</option>
              </select>
            </div>
            <div class="panel-row panel-actions">
              <button id="btn-load-preset" type="button">载入</button>
              <button id="btn-delete-preset" type="button">删除</button>
            </div>
            <div class="panel-row panel-actions">
              <button id="btn-export-preset" type="button">导出 JSON</button>
              <button id="btn-import-preset" type="button">导入 JSON</button>
              <input
                id="inp-import-preset"
                type="file"
                accept=".json,application/json"
                hidden
              />
            </div>
          </details>

          <!-- 2. 牌的绘制专项 -->
          <details class="panel-group">
            <summary>牌的绘制</summary>

            <div class="panel-row">
              <div class="panel-row-header">
                <span>使用精灵图</span>
                <span id="val-useSprites">开</span>
              </div>
              <label style="display:flex;align-items:center;gap:6px;">
                <input id="inp-useSprites" type="checkbox" />
                <span style="color:rgba(255,255,255,0.62);">关闭后会退回程序化绘制</span>
              </label>
            </div>

            <div class="panel-row">
              <div class="panel-row-header">
                <span>卡面底色</span>
                <span id="val-faceColor">#ffffff</span>
              </div>
              <input id="inp-faceColor" type="color" />
            </div>

            <div class="panel-row">
              <div class="panel-row-header">
                <span>卡牌圆角</span>
                <span id="val-cardCornerRadius">6.0</span>
              </div>
              <input
                id="inp-cardCornerRadius"
                type="number"
                min="0"
                max="24"
                step="0.5"
              />
            </div>

            <div class="panel-row">
              <div class="panel-row-header">
                <span>外缘描边色</span>
                <span id="val-outlineColor">#000000</span>
              </div>
              <input id="inp-outlineColor" type="color" />
            </div>

            <div class="panel-row">
              <div class="panel-row-header">
                <span>卡牌背面</span>
                <span id="val-cardBack">行 3 · 列 1</span>
              </div>
              <!--
                牌背选择器：把整张 Enhancers.png 当背景平铺到一个网格容器里，
                每个单元格是一个透明按钮，点击即切换 CONFIG.cardArt.back。
                被选中的格子加上 .is-active 黄色描边。
              -->
              <div id="card-back-picker" class="card-back-picker"></div>
            </div>
          </details>

          <!-- 3. 界面UI专项：Hierarchy + Inspector -->
          <details class="panel-group">
            <summary>界面UI</summary>
            <!--
              所有 UINode 自动注册到 uiHierarchy；面板初始化时把这棵树渲染进 #ui-hierarchy-tree。
              每个节点是一行可展开的折叠面板：
                - 标题栏：展开箭头 + 名字 + 拖拽 handle
                - 展开后：Transform 组件 + 其他已挂组件 + "添加组件"按钮
              拖拽规则：拖到另一个节点"标题栏"上挂为其子；拖到节点"上沿/下沿"区域为重排兄弟。
            -->
            <div id="ui-hierarchy-tree" class="ui-hier-tree"></div>
          </details>

          <!-- 4. 卡牌逻辑专项（占位） -->
          <details class="panel-group">
            <summary>卡牌逻辑</summary>
          </details>

          <!-- 5. 卡牌视效专项 -->
          <details class="panel-group">
            <summary>卡牌视效</summary>
            
            <div class="panel-row" style="background: rgba(145, 197, 58, 0.08); font-weight: bold; color: var(--accent); border-bottom: 1px solid rgba(145, 197, 58, 0.2);">
              <span>卡牌阴影效果</span>
            </div>

            <div class="panel-row">
              <div class="panel-row-header">
                <span>阴影颜色</span>
                <span id="val-shadowColor">#000000</span>
              </div>
              <input id="inp-shadowColor" type="color" />
            </div>

            <div class="panel-row">
              <div class="panel-row-header">
                <span>阴影透明度</span>
                <span id="val-shadowAlpha">0.35</span>
              </div>
              <input
                id="inp-shadowAlpha"
                type="number"
                min="0"
                max="1"
                step="0.05"
              />
            </div>

            <div class="panel-row">
              <div class="panel-row-header">
                <span>光源定点 X</span>
                <span id="val-shadowLightX">640.0</span>
              </div>
              <input
                id="inp-shadowLightX"
                type="number"
                step="5"
              />
            </div>

            <div class="panel-row">
              <div class="panel-row-header">
                <span>光源定点 Y</span>
                <span id="val-shadowLightY">360.0</span>
              </div>
              <input
                id="inp-shadowLightY"
                type="number"
                step="5"
              />
            </div>

            <div class="panel-row">
              <div class="panel-row-header">
                <span>阴影距离比例</span>
                <span id="val-shadowDistanceRatio">0.05000</span>
              </div>
              <input
                id="inp-shadowDistanceRatio"
                type="number"
                step="0.0001"
              />
            </div>

            <div class="panel-row">
              <div class="panel-row-header">
                <span>阴影大小比例</span>
                <span id="val-shadowScaleRatio">0.95</span>
              </div>
              <input
                id="inp-shadowScaleRatio"
                type="number"
                min="0"
                max="3"
                step="0.01"
              />
            </div>
          </details>

          <!-- 6. 文字视效专项（占位） -->
          <details class="panel-group">
            <summary>文字视效</summary>
          </details>
        </div>
      </div>
    </aside>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
