<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Balatro Project</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #2c3e50;
        font-family: "Microsoft YaHei", system-ui, sans-serif;
        color: #fff;
      }
      #app {
        position: absolute;
        inset: 0;
      }
      #app canvas {
        display: block;
      }
      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 24px;
        pointer-events: none;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loading">正在初始化 WebGPU 引擎与游戏资源...</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
